<!DOCTYPE html>

  <head>

    <meta name="theme-color" content="#B70000">

    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="description" content="Jarvis Smart Dashboard PITCAR">
    <!-- Force reload if blank page -->
    <script>
      if (!window.performance || performance.navigation.type !== 1) {
        sessionStorage.setItem('lastLoad', Date.now().toString());
      } else {
        const lastLoad = sessionStorage.getItem('lastLoad');
        if (lastLoad && Date.now() - parseInt(lastLoad) < 1000) {
          sessionStorage.removeItem('lastLoad');
          window.location.reload(true);
        }
      }
    </script>
    <title>Project Management PITCAR</title>
    <!-- OneSignal Push Notifications -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "98c0521b-7e77-414d-aed1-c03b8fdb4be2",
          safari_web_id: "web.onesignal.auto.4d1813bb-fb28-4cd6-9039-144582b81585",
          notifyButton: {
            enable: true,
          },
        });
      });
    </script>
  </head>
